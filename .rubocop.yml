require:
  - rubocop-sketchup

AllCops:
  NewCops: enable
  TargetRubyVersion: 2.7

Layout/EndOfLine:
  Enabled: false

Naming/ClassAndModuleCamelCase:
  Exclude:
    - 'yoo_tools/**/*.rb'

SketchUp:
  TargetSketchUpVersion: 2019
  SourcePath: .

# Extension loader is repo root; yoo_tools/*.rb are support files.
SketchupRequirements/FileStructure:
  Exclude:
    - 'yoo_tools/**/*.rb'
    - 'yoo_tools.rb'

Style/Documentation:
  Exclude:
    - 'yoo_tools/main.rb'

Metrics/BlockLength:
  Exclude:
    - 'yoo_tools/main.rb'

SketchupSuggestions/Compatibility:
  Exclude:
    - 'yoo_tools/main.rb'
