<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- SketchUp-style "align" cursor: axis cross + anchor ring -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Shadow -->
    <path d="M7 16 L25 16" stroke="#000000" stroke-opacity="0.45" stroke-width="3"/>
    <path d="M16 7 L16 25" stroke="#000000" stroke-opacity="0.45" stroke-width="3"/>
    <circle cx="22.5" cy="9.5" r="4.5" stroke="#000000" stroke-opacity="0.45" stroke-width="3"/>

    <!-- Main lines -->
    <path d="M7 16 L25 16" stroke="#ffffff" stroke-width="2"/>
    <path d="M16 7 L16 25" stroke="#ffffff" stroke-width="2"/>

    <!-- Blue "active axis" accent -->
    <path d="M16 16 L25 16" stroke="#2c7be5" stroke-width="2"/>
    <path d="M16 16 L16 7" stroke="#2c7be5" stroke-width="2"/>

    <!-- Anchor ring -->
    <circle cx="22.5" cy="9.5" r="4.5" stroke="#ffffff" stroke-width="2"/>
    <circle cx="22.5" cy="9.5" r="2" stroke="#2c7be5" stroke-width="2"/>
  </g>

  <!-- Hotspot marker -->
  <g stroke-linecap="round">
    <path d="M3 3 L7 3" stroke="#000000" stroke-opacity="0.35" stroke-width="3"/>
    <path d="M3 3 L3 7" stroke="#000000" stroke-opacity="0.35" stroke-width="3"/>
    <path d="M3 3 L7 3" stroke="#ffffff" stroke-width="2"/>
    <path d="M3 3 L3 7" stroke="#ffffff" stroke-width="2"/>
  </g>
</svg>
