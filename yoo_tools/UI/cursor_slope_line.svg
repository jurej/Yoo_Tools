<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- SketchUp-style "fixed slope line" cursor -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Shadow -->
    <path d="M6 24 L24 10" stroke="#000000" stroke-opacity="0.45" stroke-width="3"/>
    <path d="M6 24 L24 24" stroke="#000000" stroke-opacity="0.45" stroke-width="3"/>
    <path d="M24 24 L24 10" stroke="#000000" stroke-opacity="0.45" stroke-width="3"/>

    <!-- Main outline -->
    <path d="M6 24 L24 10" stroke="#ffffff" stroke-width="2"/>
    <path d="M6 24 L24 24" stroke="#ffffff" stroke-width="2"/>
    <path d="M24 24 L24 10" stroke="#ffffff" stroke-width="2"/>

    <!-- Active slope line accent -->
    <path d="M6 24 L24 10" stroke="#2c7be5" stroke-width="2"/>

    <!-- Angle arc -->
    <path d="M10 24 A4 4 0 0 1 6 20" stroke="#ffffff" stroke-width="2"/>
    <path d="M10 24 A4 4 0 0 1 6 20" stroke="#000000" stroke-opacity="0.25" stroke-width="3"/>
  </g>

  <!-- Hotspot tick -->
  <g stroke-linecap="round">
    <path d="M3 3 L7 3" stroke="#000000" stroke-opacity="0.35" stroke-width="3"/>
    <path d="M3 3 L3 7" stroke="#000000" stroke-opacity="0.35" stroke-width="3"/>
    <path d="M3 3 L7 3" stroke="#ffffff" stroke-width="2"/>
    <path d="M3 3 L3 7" stroke="#ffffff" stroke-width="2"/>
  </g>
</svg>
