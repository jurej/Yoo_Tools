<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Simple SketchUp-style "slope" cursor: right triangle + angle arc -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outline shadow -->
    <path d="M6 26 L6 10 L22 26 Z" stroke="#000000" stroke-opacity="0.45" stroke-width="3"/>
    <path d="M6 26 L22 26" stroke="#000000" stroke-opacity="0.45" stroke-width="3"/>
    <!-- Main outline -->
    <path d="M6 26 L6 10 L22 26 Z" stroke="#ffffff" stroke-width="2"/>
    <path d="M6 26 L22 26" stroke="#ffffff" stroke-width="2"/>

    <!-- Slope line highlight -->
    <path d="M6 10 L22 26" stroke="#2c7be5" stroke-width="2"/>

    <!-- Angle arc at the base -->
    <path d="M10.5 26 A4.5 4.5 0 0 1 6 21.5" stroke="#ffffff" stroke-width="2"/>
    <path d="M10.5 26 A4.5 4.5 0 0 1 6 21.5" stroke="#000000" stroke-opacity="0.25" stroke-width="3"/>
  </g>

  <!-- Small "tick" at the hot spot (top-left-ish) -->
  <g stroke-linecap="round">
    <path d="M3 3 L7 3" stroke="#000000" stroke-opacity="0.35" stroke-width="3"/>
    <path d="M3 3 L3 7" stroke="#000000" stroke-opacity="0.35" stroke-width="3"/>
    <path d="M3 3 L7 3" stroke="#ffffff" stroke-width="2"/>
    <path d="M3 3 L3 7" stroke="#ffffff" stroke-width="2"/>
  </g>
</svg>
